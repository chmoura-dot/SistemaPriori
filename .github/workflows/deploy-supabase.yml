name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-supabase.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy daily-agenda-email --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy daily-confirmation-email --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy clinic-daily-summary --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy whatsapp-reminder --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy stale-confirmation-nag --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy ams-password-alert --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
